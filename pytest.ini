[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --cov=core --cov-report=term-missing
markers =
    smoke: core pipeline smoke test (< 10s)
    unit: unit tests for individual functions/classes
    integration: integration/chain tests across modules
    slow: slow tests (> 5s)
    e2e: Playwright end-to-end tests
